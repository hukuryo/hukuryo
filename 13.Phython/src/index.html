<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
	<head>
	 	<meta charset="utf-8" />
	  	<title>フォルダ</title>
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
	  	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	  	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	</head>
	<style>
		li{
			list-style: none;
		}	
	</style>
	<body>
	  <div id="div1" style="text-align: center;">
		<p class="h1" style="margin-top: 50px;">SEC Online Boot Camp</p>
		<div class="form-base">
		    <a class="w-100 btn btn-lg btn-primary" href="/oauth2/authorization/github">ログイン</a>
		    <p style="margin-top: 10px;">ボタンを押してGitHubでログインをしてください!</p>
		</div>  
	    
	    <div id="rebiew-list"></div>
	    <!-- http://localhost:8765/oauth2/authorization/githubと同じ-->
	  </div>
	  
	  <div id="div2" style="display:none">
	      <header>
	      <div class="px-3 py-2 border-bottom mb-3">
	        <div class="container d-flex flex-wrap justify-content-center">
	          <div class="col-12 col-lg-auto mb-2 mb-lg-0 me-lg-auto"></div>
	          <div class="text-end">
	            <button type="button" class="btn btn-outline-danger"　id="logout" onClick="logout()">ログアウト</button>
	          </div>
	        </div>
	      </div>
	    </header>
	    <main class="container" style="width: 60%;">
	      <p class="h1" style="margin-top: 50px; text-align: center;">SEC Online Boot Camp</p>
	        <h4 style="margin-top: 70px;"　id="username"></h4>
	        
	        <div>
		        <!--<select class="form-select" aria-label="Default select example" style="width: 20%; margin-top: 20px;" id="pulldownMenu">
		          <option selected>講座を選択</option>
		        </select>-->
		        <ul class="list-group" id="listMenu">
				</ul>
	        </div>
	        
	        <p id="errorContents"></p>
	      </main>
	    </div>
	  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	  <script src="https://cdn.jsdelivr.net/npm/js-cookie@2/src/js.cookie.min.js"></script>

	<script type="text/javascript" th:src="@{script.js}"></script>
